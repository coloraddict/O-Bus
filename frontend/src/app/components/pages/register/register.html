<div class="row mt-3">
  <div class="col-md-12">
    <div class="register-panel">
      <p-card header="Register">
        <div class="row mt-3">
          <div class="col">
            <label for="firstname">Firstname</label>
            <input type="text" id="firstname" pInputText />
          </div>
        </div>
        <div class="row mt-2">
          <div class="col">
            <label for="firstname">Lastname</label>
            <input type="text" id="lastname" pInputText />
          </div>
        </div>
        <div class="row mt-2">
          <div class="col">
            <label for="firstname">Email</label>
            <input type="text" id="email" pInputText />
          </div>
        </div>
        <div class="row mt-2">
          <div class="col">
            <label for="firstname">Username</label>
            <input type="text" id="username" pInputText />
          </div>
        </div>
        <div class="row mt-2">
          <div class="col">
            <label for="firstname">Password</label>
            <input type="password" id="password" pInputText />
          </div>
        </div>
        <div class="row mt-2">
          <div class="col">
            <label for="firstname">Confirm Password</label>
            <input type="password" id="confirmPassword" pInputText />
          </div>
        </div>
        <div class="row mt-3">
          <div class="col">
            <p-button label="Register" />
          </div>
        </div>
        <div class="row mt-2">
          <div class="col">
            <p class="text-center">Already Have Account? <a routerLink="/login">Login Here</a></p>
          </div>
        </div>
      </p-card>
    </div>
  </div>
</div>
