<div class="row mt-3">
  <div class="col-md-12">
    <div class="login-panel">
      <p-card header="Login">
        <div class="row mt-2">
          <div class="col">
            <small>Email</small>
            <input type="text" id="email" pInputText />
          </div>
        </div>
        <div class="row mt-2">
          <div class="col">
            <small>Password</small>
            <input type="password" id="password" pInputText />
          </div>
        </div>
        <div class="row mt-3">
          <div class="col">
            <p-button label="Login" />
          </div>
        </div>
        <div class="row mt-2">
          <div class="col">
            <p class="text-center">New to O-Bus? <a routerLink="/register">Register Here</a></p>
          </div>
        </div>
      </p-card>
    </div>
  </div>
</div>
