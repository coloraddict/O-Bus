<div class="row mt-3">
  <div class="col-md-12">
    <div class="login-panel">
      <p-card header="Login">
        <form [formGroup]="loginForm">
          <div class="row mt-2">
            <div class="col">
              <label for="userName">Username</label>
              <input type="text" id="userName" formControlName="userName" pInputText />
              @if (f['userName'].touched && f['userName'].hasError('required')) {
                <small class="p-error">Username is required</small>
              }
            </div>
          </div>
          <div class="row mt-2">
            <div class="col">
              <label for="password">Password</label>
              <p-password
                formControlName="password"
                [toggleMask]="true"
                [feedback]="false"
                styleClass="w-100"
              >
              </p-password>
              @if (f['password'].touched && f['password'].hasError('required')) {
                <small class="p-error">Password is required</small>
              }
            </div>
          </div>
          <div class="row mt-3">
            <div class="col">
              <p-button label="Login" (click)="onLogin()" />
            </div>
          </div>
          <div class="row mt-2">
            <div class="col">
              <p class="text-center">New to O-Bus? <a routerLink="/register">Register Here</a></p>
            </div>
          </div>
        </form>
      </p-card>
    </div>
  </div>
</div>
