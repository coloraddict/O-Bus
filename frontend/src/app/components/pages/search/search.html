<div class="container">
  <div class="row my-5">
    <div class="col-md-12">
      <h1 class="text-center">Mumbai - Lucknow on June 12, 2026</h1>
    </div>
  </div>
  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <p-table
          #dt1
          [value]="buses"
          dataKey="id"
          [rows]="10"
          [rowsPerPageOptions]="[5, 10, 25, 50]"
          [loading]="loading"
          [paginator]="true"
          [globalFilterFields]="['name', 'departure', 'coachType', 'seatsAvailable', 'fare']"
          [scrollable]="false"
        >
          <ng-template #caption>
            <div class="flex">
              <p-iconfield iconPosition="left" class="ml-auto">
                <p-inputicon>
                  <i class="pi pi-search"></i>
                </p-inputicon>
                <input
                  pInputText
                  type="text"
                  (input)="dt1.filterGlobal($event.target.value, 'contains')"
                  placeholder="Search keyword"
                />
              </p-iconfield>
            </div>
          </ng-template>
          <ng-template #header>
            <tr>
              <th>Name</th>
              <th>Departure</th>
              <th>Coach Type</th>
              <th>Availability</th>
              <th>Fare</th>
              <th>Action</th>
            </tr>
            <tr>
              <th>
                <p-columnFilter
                  type="text"
                  field="name"
                  placeholder="Type to search"
                  ariaLabel="Filter Name"
                  filterOn="input"
                  [showMenu]="false"
                ></p-columnFilter>
              </th>
              <th>
                <p-columnFilter
                  type="text"
                  field="departure"
                  placeholder="Enter key to search"
                  ariaLabel="Filter Departure"
                  [showMenu]="false"
                ></p-columnFilter>
              </th>
              <th>
                <p-columnFilter
                  type="text"
                  field="coachType"
                  placeholder="Type to search"
                  ariaLabel="Filter Coach"
                  filterOn="input"
                  [showMenu]="false"
                ></p-columnFilter>
              </th>
              <th>
                <p-columnFilter
                  type="text"
                  field="availibility"
                  placeholder="Type to search"
                  ariaLabel="Filter Seats"
                  filterOn="input"
                  [showMenu]="false"
                ></p-columnFilter>
              </th>
              <th>
                <p-columnFilter
                  type="text"
                  field="fare"
                  placeholder="Type to search"
                  ariaLabel="Filter Fare"
                  filterOn="input"
                  [showMenu]="false"
                ></p-columnFilter>
              </th>
              <th></th>
            </tr>
          </ng-template>
          <ng-template #body let-bus>
            <tr>
              <td>
                {{ bus.name }}
              </td>
              <td>
                <div class="flex items-center gap-2">
                  <span>{{ bus.departure }}</span>
                </div>
              </td>
              <td style="text-align: center">
                {{ bus.coachType }}
              </td>
              <td style="text-align: center">
                {{ bus.seatsAvailable }}
              </td>
              <td style="text-align: center">
                {{ bus.fare }}
              </td>
              <td>
                <!-- ✅ new button -->
                <p-button
                  label="View Seats"
                  (onClick)="onViewSeats(bus)"
                  severity="danger"
                  size="small"
                />
              </td>
            </tr>
          </ng-template>
          <ng-template #emptymessage>
            <tr>
              <td colspan="5">No buses found.</td>
            </tr>
          </ng-template>
        </p-table>
      </div>
    </div>
  </div>
</div>
