<div class="details-block">
  <div class="row">
    <div class="col-md-8">
      <h4>Adult:&nbsp;</h4>
      <span>(26-57 years)</span>
    </div>
    <div class="col-md-4">
      <div class="counter-block">
        <span><p-button icon="pi pi-minus-circle" aria-label="Save" /></span>
        <span class="count-display"><p>0</p></span>
        <span><p-button icon="pi pi-plus-circle" aria-label="Save" /></span>
      </div>
    </div>
    <div class="row mt-2">
      <div class="col-md-8">
        <h6>Adult 1</h6>
      </div>
      <div class="col-md-4">
        <p-select
          [(ngModel)]="value1"
          [options]="cityList"
          optionLabel="name"
          size="small"
          placeholder="Small"
          class="w-full md:w-56"
        />
      </div>
    </div>
  </div>
  <div class="block-hr"><hr /></div>
  <div class="row">
