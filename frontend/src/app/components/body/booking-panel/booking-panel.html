<div class="card booking-panel">
  <p-toolbar class="booking-toolbar">
    <div class="flex-container">
      <div>
        <p-autocomplete
          [(ngModel)]="selectedCity1"
          [suggestions]="filteredCities1"
          (completeMethod)="filterCities1($event)"
          optionLabel="cityName"
          id="fromCity"
        >
          <ng-template let-city pTemplate="item">
            {{ city.cityName }}
          </ng-template>
        </p-autocomplete>
      </div>
      <div>
        <p-autoComplete
          [(ngModel)]="selectedCity2"
          [suggestions]="filteredCities2"
          (completeMethod)="filterCities2($event)"
          optionLabel="cityName"
        >
        </p-autoComplete>
      </div>
      <div>
        <p-datepicker
          [showButtonBar]="true"
          placeholder="From date"
          class="booking-datepicker"
          [(ngModel)]="fromDate"
        />
      </div>
      <div>
        <p-datepicker
          [showButtonBar]="true"
          placeholder="To date"
          class="booking-datepicker"
          [(ngModel)]="toDate"
        />
      </div>
      <div>
        <div class="traveller-detail"></div>
      </div>
      <div>
        <p-button label="Search Buses" class="booking-button" />
      </div>
    </div>
